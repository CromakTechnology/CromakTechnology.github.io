<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Conexão Perdida</title>
    <style>
        /* Variáveis para facilitar customização */
        :root {
            --primary: #23a6d5;
            --secondary: #e73c7e;
            --glitch-color: #00fff9;
            --glitch-color-2: #ff00c1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efeito de Overlay (Scanlines) para parecer monitor antigo */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 90%;
            width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 3;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajuste do tamanho da imagem corrigido */
        img {
            max-width: 90%;
            padding-top: 20px;
            height: auto;
            filter: drop-shadow(0px 0px 15px var(--primary));
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 400;
        }

        p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* ----- EFEITO GLITCH REAL ----- */
        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-color);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--glitch-color-2);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(1px, 9999px, 13px, 0); }
            80% { clip: rect(53px, 9999px, 86px, 0); }
            100% { clip: rect(91px, 9999px, 98px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(30px, 9999px, 20px, 0); }
            40% { clip: rect(18px, 9999px, 2px, 0); }
            60% { clip: rect(25px, 9999px, 40px, 0); }
            80% { clip: rect(15px, 9999px, 80px, 0); }
            100% { clip: rect(55px, 9999px, 60px, 0); }
        }

        /* Botão estilizado */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 2px solid var(--primary);
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

    </style>
</head>
